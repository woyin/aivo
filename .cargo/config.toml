# Statically link the MSVC C runtime for Windows targets so the released
# binaries don't depend on VCRUNTIME140.dll being installed on the user's
# machine. On Windows ARM64 in particular, vcruntime140.dll is not part of
# the base OS and ships only with the Visual C++ Redistributable — without
# this flag, `aivo.exe` silently fails to load with STATUS_DLL_NOT_FOUND
# (0xC0000135) on a fresh ARM64 install.
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

[target.aarch64-pc-windows-msvc]
rustflags = ["-C", "target-feature=+crt-static"]

# Strip unused SQLite extensions from the bundled libsqlite3-sys build. aivo's
# SQL is plain tables + json_extract (JSON1 stays); the only external DB it
# opens is OpenCode's, which has no virtual tables. libsqlite3-sys appends
# these after its own -D flags, so the -U undefines win.
[env]
LIBSQLITE3_FLAGS = "-USQLITE_ENABLE_FTS3 -USQLITE_ENABLE_FTS3_PARENTHESIS -USQLITE_ENABLE_FTS5 -USQLITE_ENABLE_RTREE -USQLITE_ENABLE_STAT4 -USQLITE_ENABLE_DBSTAT_VTAB -USQLITE_ENABLE_MEMORY_MANAGEMENT -USQLITE_SOUNDEX"
