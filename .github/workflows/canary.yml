name: Canary

# Nightly upstream-drift detector: build aivo from main, then drive each real
# coding-agent CLI (latest from npm) through aivo's loopback router against the
# free `aivo/starter` provider — no API key/secret needed. Catches the case
# where an upstream CLI release silently breaks aivo's integration before users
# report it.
#
# Two layers per tool:
#   1. liveness    — a plain text reply, exercising the request/response
#                    envelope conversion + launch wiring.
#   2. tool round-trip — the agent must create a sentinel file, which it cannot
#                    do without a full tool_call -> tool_result cycle through
#                    aivo's (O(N^2)) format converters. This is where the real
#                    fragility lives.
#
# Each tool is its own matrix leg (fail-fast: false); the two layers are
# separate assertions so a failure says WHICH layer broke. Adding a tool is one
# matrix entry.

on:
  schedule:
    # Every 3 days at 06:23 UTC (day-of-month step; resets each month, so the
    # boundary gap can be 1–3 days). GitHub cron has no true N-day interval.
    - cron: '23 6 */3 * *'
  workflow_dispatch:

concurrency:
  group: canary
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.97.0
      - uses: Swatinem/rust-cache@v2
      - name: Build aivo
        run: cargo build --release
      - uses: actions/upload-artifact@v5
        with:
          name: aivo-bin
          path: target/release/aivo

  smoke:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: claude
            package: '@anthropic-ai/claude-code'
            text_run: '-p'
            tool_run: '-p --dangerously-skip-permissions'
          - tool: codex
            package: '@openai/codex'
            # exec refuses a non-git dir without --skip-git-repo-check; codex's
            # own linux-sandbox can't nest inside the Actions runner (bwrap
            # loopback fails), so bypass it — the runner is the isolation.
            text_run: 'exec --skip-git-repo-check'
            tool_run: 'exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox'
          - tool: gemini
            package: '@google/gemini-cli'
            text_run: '-p'
            # `-p` takes the prompt as its value, so it must come LAST (the
            # harness appends the prompt right after tool_run).
            tool_run: '--approval-mode yolo -p'
            # Gemini CLI refuses headless runs in an untrusted dir without this.
            extra_env: 'GEMINI_CLI_TRUST_WORKSPACE=true'
          - tool: opencode
            package: 'opencode-ai'
            text_run: 'run'
            tool_run: 'run --dangerously-skip-permissions'
          - tool: pi
            package: '@earendil-works/pi-coding-agent'
            text_run: '-p'
            tool_run: '-p -a'
    steps:
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - uses: actions/download-artifact@v5
        with:
          name: aivo-bin

      - name: Install tool (latest)
        env:
          PACKAGE: ${{ matrix.package }}
        run: npm install -g "$PACKAGE"

      - name: Smoke through aivo against starter
        env:
          TOOL: ${{ matrix.tool }}
          TEXT_RUN: ${{ matrix.text_run }}
          TOOL_RUN: ${{ matrix.tool_run }}
          EXTRA_ENV: ${{ matrix.extra_env }}
        run: |
          chmod +x aivo
          AIVO="$PWD/aivo"
          CLI_VER=$("$TOOL" --version 2>/dev/null | head -1 || echo "?")
          TEXT_PROMPT='Reply with exactly this token and nothing else: CANARY_OK'
          TOOL_PROMPT='Create a file named canary_done.txt in the current working directory with exactly this content: CANARY_OK'
          fail=0

          # Layer 1 — liveness: launch + request/response envelope conversion.
          # Fresh HOME → aivo's `aivo/starter` provider activates on first run,
          # so the canary needs no API key or repo secret.
          export HOME
          HOME=$(mktemp -d)
          WORK=$(mktemp -d)
          OUT=$(cd "$WORK" && timeout 180 env $EXTRA_ENV "$AIVO" "$TOOL" $TEXT_RUN "$TEXT_PROMPT" 2>&1) || true
          if echo "$OUT" | grep -q CANARY_OK; then
            echo "✅ \`$TOOL\` liveness (CLI $CLI_VER)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ \`$TOOL\` liveness (CLI $CLI_VER) — no CANARY_OK in reply" >> "$GITHUB_STEP_SUMMARY"
            echo "--- $TOOL liveness output ---"; echo "$OUT"
            fail=1
          fi

          # Layer 2 — tool round-trip: the agent must create the sentinel file,
          # exercising the full tool_call -> tool_result path through aivo's
          # format converters.
          HOME=$(mktemp -d)
          WORK=$(mktemp -d)
          TOOL_OUT=$(cd "$WORK" && timeout 180 env $EXTRA_ENV "$AIVO" "$TOOL" $TOOL_RUN "$TOOL_PROMPT" 2>&1) || true
          if [ -f "$WORK/canary_done.txt" ] && grep -q CANARY_OK "$WORK/canary_done.txt"; then
            echo "✅ \`$TOOL\` tool round-trip (CLI $CLI_VER)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ \`$TOOL\` tool round-trip (CLI $CLI_VER) — sentinel file not created" >> "$GITHUB_STEP_SUMMARY"
            echo "--- $TOOL tool round-trip output ---"; echo "$TOOL_OUT"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error title=canary failure::$TOOL round-trip failed (CLI $CLI_VER)"
            exit 1
          fi

  # Protocol-transform coverage: point each CLI at a LOCAL fake that speaks
  # ONLY OpenAI, via a synthesized key. The CLI's native protocol
  # (Anthropic/Google/Responses) is thus FORCED through aivo's cross-protocol
  # converters — the matrix the starter path (native pass-through) bypasses.
  # Two layers: envelope (text) and tool-call (the agent's native tool_use is
  # transformed to OpenAI tool_calls and the result back). No secret/cost: the
  # fake is deterministic — it emits a tool_call that writes the sentinel file.
  transform:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tool: claude
            package: '@anthropic-ai/claude-code'
            text_run: '-p'
            tool_run: '-p --dangerously-skip-permissions'
            transform: 'Anthropic <-> OpenAI'
          - tool: gemini
            package: '@google/gemini-cli'
            text_run: '-p'
            tool_run: '--approval-mode yolo -p'
            extra_env: 'GEMINI_CLI_TRUST_WORKSPACE=true'
            transform: 'Google <-> OpenAI'
          - tool: codex
            package: '@openai/codex'
            text_run: 'exec --skip-git-repo-check'
            tool_run: 'exec --skip-git-repo-check --dangerously-bypass-approvals-and-sandbox'
            transform: 'Responses <-> Chat'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: actions/download-artifact@v5
        with:
          name: aivo-bin
      - name: Install tool (latest)
        env:
          PACKAGE: ${{ matrix.package }}
        run: npm install -g "$PACKAGE"
      - name: Force cross-protocol transform via local OpenAI fake
        env:
          TOOL: ${{ matrix.tool }}
          TEXT_RUN: ${{ matrix.text_run }}
          TOOL_RUN: ${{ matrix.tool_run }}
          EXTRA_ENV: ${{ matrix.extra_env }}
          TRANSFORM: ${{ matrix.transform }}
        run: |
          chmod +x aivo
          AIVO="$PWD/aivo"
          CLI_VER=$("$TOOL" --version 2>/dev/null | head -1 || echo "?")
          fail=0

          # run_layer MODE RUN_ARGS PROMPT → starts a fresh fake in MODE, points
          # the CLI at it via a synthesized key, runs it. Sets LAYER_OUT /
          # LAYER_SEEN / LAYER_WORK / LAYER_DUMP for the caller's assertions.
          run_layer() {
            local mode="$1" run_args="$2" prompt="$3"
            local seen="$PWD/seen_$mode.log" dump="$PWD/dump_$mode.log"
            FAKE_MODE="$mode" FAKE_SEEN_LOG="$seen" FAKE_DUMP_LOG="$dump" \
              python3 .github/canary/fake_openai.py 0 > port_$mode.txt 2>/dev/null &
            local fpid=$! port home work
            sleep 1
            port=$(head -1 "port_$mode.txt")
            home=$(mktemp -d); work=$(mktemp -d)
            HOME="$home" "$AIVO" keys add --name cfake \
              --base-url "http://127.0.0.1:$port/v1" --key sk-fake >/dev/null 2>&1
            LAYER_OUT=$( cd "$work" && HOME="$home" timeout 180 \
              env $EXTRA_ENV "$AIVO" "$TOOL" -k cfake $run_args "$prompt" 2>&1 ) || true
            kill "$fpid" 2>/dev/null || true
            LAYER_SEEN="$seen"; LAYER_WORK="$work"; LAYER_DUMP="$dump"
            echo "--- $mode layer output ---"; echo "$LAYER_OUT"
            echo "--- fake ($mode) received ---"; sort -u "$seen" || true
          }

          # Layer A — envelope transform (text reply).
          run_layer text "$TEXT_RUN" "Reply with exactly this token and nothing else: CANARY_OK"
          if ! echo "$LAYER_OUT" | grep -q CANARY_OK; then
            echo "❌ \`$TOOL\` $TRANSFORM envelope (CLI $CLI_VER) — no CANARY_OK after transform" >> "$GITHUB_STEP_SUMMARY"
            fail=1
          elif ! grep -q "chat/completions" "$LAYER_SEEN"; then
            # Reply "worked" but never reached the OpenAI fake → the transform
            # didn't actually fire; that's a false pass to reject.
            echo "❌ \`$TOOL\` $TRANSFORM envelope (CLI $CLI_VER) — reply seen but fake got no OpenAI request" >> "$GITHUB_STEP_SUMMARY"
            fail=1
          else
            echo "✅ \`$TOOL\` $TRANSFORM envelope (CLI $CLI_VER)" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Layer B — tool-call transform: the agent's native tool_use is
          # transformed to OpenAI tool_calls, the fake answers with a tool_call
          # that writes the sentinel, and the tool result is transformed back.
          # File existence proves the full cross-protocol tool cycle.
          run_layer tool "$TOOL_RUN" "Create a file named canary_done.txt with content CANARY_OK"
          if [ -f "$LAYER_WORK/canary_done.txt" ] && grep -q CANARY_OK "$LAYER_WORK/canary_done.txt" \
              && grep -q "chat/completions" "$LAYER_SEEN"; then
            echo "✅ \`$TOOL\` $TRANSFORM tool-call (CLI $CLI_VER)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ \`$TOOL\` $TRANSFORM tool-call (CLI $CLI_VER) — sentinel not created across transform" >> "$GITHUB_STEP_SUMMARY"
            echo "--- fake (tool) debug dump ---"; cat "$LAYER_DUMP" 2>/dev/null || true
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "::error title=transform failure::$TOOL $TRANSFORM failed (CLI $CLI_VER)"
            exit 1
          fi
