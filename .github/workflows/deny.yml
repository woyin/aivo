name: Deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deny-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2.0.20
        with:
          command: check advisories bans licenses sources
