name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
            buildstd: true   # rebuild std w/ panic=immediate-abort to keep the binary < 10 MB
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
            use-cross: true
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-arm64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}

      # linux-x64 only: nightly + rust-src for -Z build-std size reduction.
      # Pinned nightly (interface: -Cpanic=immediate-abort strategy flag).
      - uses: dtolnay/rust-toolchain@master
        if: matrix.buildstd
        with:
          toolchain: nightly-2026-07-08
          targets: ${{ matrix.target }}
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.use-cross }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools
        if: contains(matrix.target, 'linux') && !matrix.use-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build ${{ matrix.artifact }}
        shell: bash
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          elif [[ "${{ matrix.buildstd }}" == "true" ]]; then
            # Shrink the musl static binary below 10 MB by rebuilding std with
            # panic=immediate-abort (drops panic/format machinery), no panic
            # location strings, and size-optimized std internals (drops the
            # backtrace machinery, dead under immediate-abort). Nightly-only.
            RUSTFLAGS="-Zunstable-options -Cpanic=immediate-abort -Zlocation-detail=none" \
              cargo +nightly-2026-07-08 build --release \
              -Z build-std=std,panic_abort -Z build-std-features=optimize_for_size \
              --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename artifact and generate checksum
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*
