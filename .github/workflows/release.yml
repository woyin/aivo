name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
            buildstd: true   # rebuild std w/ panic=immediate-abort to keep the binary < 10 MB
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
            use-cross: true
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-arm64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          targets: ${{ matrix.target }}

      # linux-x64 only: nightly + rust-src for -Z build-std size reduction.
      # Pinned nightly (interface: -Cpanic=immediate-abort strategy flag).
      - uses: dtolnay/rust-toolchain@master
        if: matrix.buildstd
        with:
          toolchain: nightly-2026-07-08
          targets: ${{ matrix.target }}
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.use-cross }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools
        if: contains(matrix.target, 'linux') && !matrix.use-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build ${{ matrix.artifact }}
        shell: bash
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }}
          elif [[ "${{ matrix.buildstd }}" == "true" ]]; then
            # Shrink the musl static binary below 10 MB by rebuilding std with
            # panic=immediate-abort (drops panic/format machinery). Nightly-only.
            RUSTFLAGS="-Zunstable-options -Cpanic=immediate-abort" \
              cargo +nightly-2026-07-08 build --release \
              -Z build-std=std,panic_abort --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Rename artifact and generate checksum
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  upload-r2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Sign artifacts (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          # Fail closed: never publish a release the strict client can't verify.
          if [ -z "$MINISIGN_SECRET_KEY" ]; then
            echo "::error::MINISIGN_SECRET_KEY is not set — refusing to publish unsigned artifacts" >&2
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq minisign
          printf '%s\n' "$MINISIGN_SECRET_KEY" > minisign.key
          # Detached signature per binary (skip the .sha256 sidecars). `update.rs`
          # fetches <binary>.minisig and verifies it against the embedded pubkey.
          for f in artifacts/aivo-*; do
            case "$f" in
              *.sha256|*.minisig) continue ;;
            esac
            printf '%s\n' "$MINISIGN_PASSWORD" | minisign -S -s minisign.key -m "$f"
          done
          rm -f minisign.key
          # Cross-check against the pubkey embedded in this tag's source: a
          # mismatched CI secret would otherwise publish a release that every
          # client's `aivo update` rejects — discovered only post-publish.
          PUBKEY=$(sed -n 's/^const MINISIGN_PUBKEY: &str = "\([^"]*\)".*/\1/p' src/commands/update.rs)
          if [ -z "$PUBKEY" ]; then
            echo "::error::could not extract MINISIGN_PUBKEY from src/commands/update.rs" >&2
            exit 1
          fi
          for f in artifacts/aivo-*; do
            case "$f" in
              *.sha256|*.minisig) continue ;;
            esac
            if ! minisign -V -P "$PUBKEY" -m "$f" -q; then
              echo "::error::$f signature does not verify against the embedded MINISIGN_PUBKEY — signing secret and src/commands/update.rs pubkey are out of sync" >&2
              exit 1
            fi
          done

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.ref_name }}"

          for f in artifacts/aivo-*; do
            KEY="${VERSION}/$(basename "$f")"
            echo "Uploading ${KEY}..."
            wrangler r2 object put "aivo-releases/${KEY}" --file "$f" --remote
          done

          echo -n "${VERSION#v}" | wrangler r2 object put "aivo-releases/latest" --pipe --remote

  update-npm:
    needs: upload-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd npm
          npm pkg set version="$VERSION"

      - name: Run tests
        run: cd npm && npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

  update-homebrew:
    needs: upload-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Read checksums and update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          DARWIN_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-arm64.sha256)
          DARWIN_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-x64.sha256)
          LINUX_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-arm64.sha256)
          LINUX_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-x64.sha256)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yuanchuan/homebrew-tap.git"

          python3 - <<EOF
          import re

          with open("homebrew-tap/Formula/aivo.rb") as f:
              content = f.read()

          content = re.sub(r'version "[^"]*"', 'version "${VERSION}"', content)

          shas = [
              "${DARWIN_ARM64_SHA}",
              "${DARWIN_X64_SHA}",
              "${LINUX_ARM64_SHA}",
              "${LINUX_X64_SHA}",
          ]
          idx = 0
          def replace_sha(m):
              global idx
              result = f'sha256 "{shas[idx]}"'
              idx += 1
              return result

          content = re.sub(r'sha256 "[a-f0-9]+"', replace_sha, content)

          with open("homebrew-tap/Formula/aivo.rb", "w") as f:
              f.write(content)
          EOF

          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/aivo.rb
          git commit -m "chore: update aivo to v${VERSION}"
          git push
