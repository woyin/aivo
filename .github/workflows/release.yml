name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-x64
          - target: aarch64-unknown-linux-musl
            runs-on: ubuntu-latest
            artifact: aivo-linux-arm64
            use-cross: true
          - target: x86_64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-x64
          - target: aarch64-apple-darwin
            runs-on: macos-latest
            artifact: aivo-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-x64.exe
          - target: aarch64-pc-windows-msvc
            runs-on: windows-latest
            artifact: aivo-windows-arm64.exe
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        if: ${{ !matrix.use-cross }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install musl-tools
        if: contains(matrix.target, 'linux') && !matrix.use-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build ${{ matrix.artifact }}
        shell: bash
        env:
          # Linux artifacts ship without rodio so the binary doesn't
          # hard-link libasound.so.2 — minimal / headless servers (no ALSA)
          # can run aivo. macOS / Windows keep default features (audio
          # playback for `aivo audio`).
          CARGO_BUILD_FLAGS: ${{ contains(matrix.target, 'linux') && '--no-default-features' || '' }}
        run: |
          if [[ "${{ matrix.use-cross }}" == "true" ]]; then
            cross build --release --target ${{ matrix.target }} $CARGO_BUILD_FLAGS
          else
            cargo build --release --target ${{ matrix.target }} $CARGO_BUILD_FLAGS
          fi

      - name: Rename artifact and generate checksum
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.runs-on }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/aivo.exe dist/${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/aivo dist/${{ matrix.artifact }}
          fi
          cd dist
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  upload-r2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VERSION="${{ github.ref_name }}"

          for f in artifacts/aivo-*; do
            KEY="${VERSION}/$(basename "$f")"
            echo "Uploading ${KEY}..."
            wrangler r2 object put "aivo-releases/${KEY}" --file "$f" --remote
          done

          echo -n "${VERSION#v}" | wrangler r2 object put "aivo-releases/latest" --pipe --remote

  update-npm:
    needs: upload-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set npm package version
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          cd npm
          npm pkg set version="$VERSION"

      - name: Run tests
        run: cd npm && npm test

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd npm && npm publish --access public

  update-homebrew:
    needs: upload-r2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
          merge-multiple: true

      - name: Read checksums and update homebrew-tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"

          DARWIN_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-arm64.sha256)
          DARWIN_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-darwin-x64.sha256)
          LINUX_ARM64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-arm64.sha256)
          LINUX_X64_SHA=$(cut -d' ' -f1 < artifacts/aivo-linux-x64.sha256)

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/yuanchuan/homebrew-tap.git"

          python3 - <<EOF
          import re

          with open("homebrew-tap/Formula/aivo.rb") as f:
              content = f.read()

          content = re.sub(r'version "[^"]*"', 'version "${VERSION}"', content)

          shas = [
              "${DARWIN_ARM64_SHA}",
              "${DARWIN_X64_SHA}",
              "${LINUX_ARM64_SHA}",
              "${LINUX_X64_SHA}",
          ]
          idx = 0
          def replace_sha(m):
              global idx
              result = f'sha256 "{shas[idx]}"'
              idx += 1
              return result

          content = re.sub(r'sha256 "[a-f0-9]+"', replace_sha, content)

          with open("homebrew-tap/Formula/aivo.rb", "w") as f:
              f.write(content)
          EOF

          cd homebrew-tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/aivo.rb
          git commit -m "chore: update aivo to v${VERSION}"
          git push
