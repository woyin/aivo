name: Test

on:
  workflow_call:

jobs:
  test:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      # CI: fail loud if Landlock is missing on the Linux runner (see tests/sandbox_linux.rs).
      - run: cargo test --features __internal_test_fast_crypto
        env:
          AIVO_REQUIRE_LANDLOCK: ${{ matrix.runs-on == 'ubuntu-latest' && '1' || '' }}

      - run: cargo clippy -- -D warnings

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm test
        working-directory: npm
